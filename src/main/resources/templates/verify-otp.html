<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Xác thực OTP</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <h2>Xác thực OTP</h2>
        <p class="sub">Nhập mã gồm 6 chữ số đã gửi qua email</p>

        <p class="error" th:if="${error}" th:text="${error}"></p>

        <form th:action="@{/verify-otp}" method="post" id="otpForm">
            <input type="hidden" name="email" th:value="${email}">
            <input type="hidden" name="otp" id="otpValue">

            <div class="otp-container">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
            </div>

            <button type="submit">Xác nhận</button>
        </form>
        <div style="margin-top:16px; text-align:start;">
            <a th:href="@{/forgot-password}" style="font-size:14px;">
                ← Quay lại
            </a>
        </div>


    </div>
</div>

<script>
    const inputs = document.querySelectorAll(".otp-input");
    const otpHidden = document.getElementById("otpValue");

    inputs.forEach((input, index) => {
        input.addEventListener("input", (e) => {
            const value = e.target.value.replace(/[^0-9]/g, "");
            e.target.value = value;

            if (value && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
            updateOtpValue();
        });

        input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !input.value && index > 0) {
                inputs[index - 1].focus();
            }
        });

        input.addEventListener("paste", (e) => {
            const pasteData = e.clipboardData.getData("text").replace(/\D/g, "");
            if (pasteData.length === 6) {
                inputs.forEach((inp, i) => inp.value = pasteData[i]);
                updateOtpValue();
            }
        });
    });

    function updateOtpValue() {
        otpHidden.value = Array.from(inputs).map(i => i.value).join("");
    }

    document.getElementById("otpForm").addEventListener("submit", (e) => {
        updateOtpValue();
        if (otpHidden.value.length !== 6) {
            e.preventDefault();
            alert("Vui lòng nhập đủ 6 chữ số OTP");
        }
    });
</script>

</body>
</html>
